<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经营总览 - 华悦艺术酒店</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f2f7;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #1a1a2e;
      min-height: 100vh;
    }
    .topbar {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .topbar h1 { font-size: 18px; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .user-badge {
      background: rgba(255,255,255,0.15); border-radius: 20px;
      padding: 6px 14px; font-size: 13px;
    }
    .logout-btn {
      background: rgba(233,69,96,0.2); border: 1px solid rgba(233,69,96,0.4);
      color: #ff8fa3; padding: 6px 14px; border-radius: 20px;
      font-size: 13px; cursor: pointer; border: none;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

    /* Month selector */
    .month-bar {
      background: #fff; border-radius: 14px; padding: 14px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .month-bar-label { font-size: 13px; font-weight: 700; color: #555; white-space: nowrap; }
    .month-bar select {
      padding: 8px 14px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; font-size: 14px; font-weight: 600;
      color: #1a1a2e; cursor: pointer; outline: none;
      background: #fafafa; transition: border-color 0.2s;
    }
    .month-bar select:focus { border-color: #0f3460; }
    .month-bar-hint { font-size: 12px; color: #aaa; margin-left: auto; }
    .staff-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f0f4ff; border: 1px solid #c5d0f0;
      color: #0f3460; padding: 8px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
    }
    .staff-link:hover { background: #e0e8ff; }

    /* Section Card */
    .section-card {
      background: #fff; border-radius: 16px; padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 20px;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .section-title {
      font-size: 15px; font-weight: 700; color: #1a1a2e;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title .icon { font-size: 18px; }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .kpi-card {
      background: #fff; border-radius: 16px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.15s;
    }
    .kpi-card:hover { transform: translateY(-2px); }
    .kpi-label { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; }
    .kpi-value { font-size: 24px; font-weight: 800; color: #1a1a2e; }
    .kpi-value.red { color: #e94560; }
    .kpi-value.blue { color: #0f3460; }
    .kpi-value.green { color: #2e7d32; }
    .kpi-value.orange { color: #e65100; }
    .kpi-sub { font-size: 12px; color: #aaa; margin-top: 4px; }

    /* Charts Grid */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: #fff; border-radius: 16px; padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .chart-title { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 12px; }
    canvas { max-height: 280px; }

    /* Two Column Layout */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* Tables */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      background: #f5f6fa; padding: 10px 12px; text-align: left;
      font-weight: 600; color: #666; border-radius: 8px;
    }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover { background: #f8f9fc; }
    .data-table .num { font-weight: 700; color: #0f3460; }
    .data-table .money { font-weight: 700; color: #e94560; }
    .data-table .rate { font-weight: 700; color: #2e7d32; }

    /* Channel Card */
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .channel-item {
      background: #f8f9fc; border-radius: 12px; padding: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .channel-icon { font-size: 28px; }
    .channel-info { flex: 1; }
    .channel-name { font-weight: 600; font-size: 13px; color: #555; }
    .channel-value { font-size: 18px; font-weight: 700; color: #1a1a2e; }
    .channel-sub { font-size: 11px; color: #888; }

    /* Room Type Card */
    .roomtype-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .roomtype-item {
      background: linear-gradient(135deg, #f8f9fc, #fff);
      border: 1px solid #e8e8f0; border-radius: 12px; padding: 14px;
    }
    .roomtype-name { font-weight: 600; font-size: 13px; color: #555; margin-bottom: 8px; }
    .roomtype-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
    .roomtype-label { color: #888; }
    .roomtype-value { font-weight: 600; color: #1a1a2e; }

    /* Daily Reports Table */
    .daily-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .daily-table th {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff; padding: 10px 8px; text-align: center;
      font-weight: 600; position: sticky; top: 0;
    }
    .daily-table th:first-child { border-radius: 8px 0 0 8px; text-align: left; }
    .daily-table th:last-child { border-radius: 0 8px 8px 0; }
    .daily-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; text-align: center; }
    .daily-table td:first-child { text-align: left; font-weight: 600; color: #0f3460; }
    .daily-table tr:hover { background: #f8f9fc; }
    .table-container { max-height: 400px; overflow-y: auto; border-radius: 8px; }

    /* Loading */
    .loading-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 40px; color: #888; font-size: 14px;
    }
    .spinner {
      width: 20px; height: 20px; border: 2px solid #e0e0e0;
      border-top-color: #0f3460; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* Badge */
    .badge {
      display: inline-block; padding: 3px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .badge-green { background: #e8f5e9; color: #2e7d32; }
    .badge-red { background: #ffebee; color: #c62828; }
    .badge-orange { background: #fff3e0; color: #e65100; }
    .badge-blue { background: #e3f2fd; color: #1565c0; }

    /* Tab Navigation */
    .tabs {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .tab-btn {
      padding: 8px 16px; border: none; border-radius: 8px;
      background: #f0f0f0; color: #666; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: #0f3460; color: #fff; }
    .tab-btn:hover:not(.active) { background: #e0e0e0; }

    /* Responsive */
    @media (max-width: 768px) {
      .charts-grid { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .daily-table { font-size: 11px; }
      .daily-table th, .daily-table td { padding: 6px 4px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📊 华悦艺术酒店 · 冠华店经营总览</h1>
    <div class="topbar-right">
      <a class="staff-link" href="staff.html">👤 员工上传</a>
      <span class="user-badge" id="userBadge">加载中…</span>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="container">
    <!-- 月份选择器 -->
    <div class="month-bar">
      <span class="month-bar-label">📅 查看月份：</span>
      <select id="yearSelect"></select>
      <select id="monthSelect"></select>
      <button class="staff-link" onclick="loadData()" style="padding:8px 18px;font-size:14px">🔍 查看</button>
      <span class="month-bar-hint" id="monthBarHint">切换月份后点击查看，刷新所有数据</span>
    </div>

    <!-- ==================== 模块一：月度总概况 ==================== -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-title"><span class="icon">🏆</span> 月度总概况</div>
        <span class="badge badge-blue" id="reportCountBadge">0 天</span>
      </div>
      <div class="kpi-grid" id="kpiGrid">
        <div class="kpi-card">
          <div class="kpi-label">报表数</div>
          <div class="kpi-value blue" id="kpiReports">—</div>
          <div class="kpi-sub">已上传日报</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">月总收入</div>
          <div class="kpi-value red" id="kpiIncome">—</div>
          <div class="kpi-sub">累计收入</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">日均收入</div>
          <div class="kpi-value red" id="kpiAvgIncome">—</div>
          <div class="kpi-sub">月平均</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">平均入住率</div>
          <div class="kpi-value green" id="kpiOccupancy">—</div>
          <div class="kpi-sub" id="kpiOccupancyHint">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">平均房价</div>
          <div class="kpi-value orange" id="kpiAvgPrice">—</div>
          <div class="kpi-sub">RevPGR</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">总开房数</div>
          <div class="kpi-value blue" id="kpiTotalRooms">—</div>
          <div class="kpi-sub">间夜数</div>
        </div>
      </div>
    </div>

    <!-- ==================== 模块二：趋势图表 ==================== -->
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">📈 开房数量与营业额趋势（柱状图）</div>
        <canvas id="roomsIncomeChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">📉 入住率与RevPGR趋势（折线图）</div>
        <canvas id="occRevpgrChart"></canvas>
      </div>
    </div>

    <!-- ==================== 模块三：各渠道经营数据 ==================== -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-title"><span class="icon">🏢</span> 各渠道经营数据</div>
      </div>
      <div class="channel-grid" id="channelGrid">
        <!-- 动态填充 -->
      </div>
      <div style="margin-top:20px">
        <div class="chart-title">💰 渠道收入占比</div>
        <canvas id="channelPieChart" style="max-height:250px"></canvas>
      </div>
    </div>

    <!-- ==================== 模块四：各房型经营数据 ==================== -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-title"><span class="icon">🛏️</span> 各房型经营数据</div>
      </div>
      <div class="roomtype-grid" id="roomtypeGrid">
        <!-- 动态填充 -->
      </div>
      <div style="margin-top:20px">
        <div class="chart-title">🏠 房型收入分布</div>
        <canvas id="roomtypeChart" style="max-height:300px"></canvas>
      </div>
    </div>

    <!-- ==================== 模块五：当月完整日报明细 ==================== -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-title"><span class="icon">📋</span> 当月完整日报明细</div>
        <div>
          <button class="tab-btn active" onclick="switchTab('daily')">日报明细</button>
          <button class="tab-btn" onclick="switchTab('export')">导出数据</button>
        </div>
      </div>

      <!-- 日报明细 Tab -->
      <div id="dailyTab">
        <div class="table-container">
          <table class="daily-table" id="dailyTable">
            <thead>
              <tr>
                <th>日期</th>
                <th>总收入</th>
                <th>开房数</th>
                <th>入住率</th>
                <th>均价</th>
                <th>RevPGR</th>
                <th>美团</th>
                <th>携程</th>
                <th>飞猪</th>
                <th>抖音</th>
                <th>微信</th>
                <th>现金</th>
                <th>支付宝</th>
              </tr>
            </thead>
            <tbody id="dailyTableBody">
              <!-- 动态填充 -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- 导出 Tab -->
      <div id="exportTab" style="display:none">
        <div style="padding:20px">
          <p style="margin-bottom:16px;color:#666">点击下方按钮导出Excel报表：</p>
          <button class="staff-link" onclick="exportDaily()" style="padding:12px 24px;font-size:14px">
            📊 导出日报Excel
          </button>
          <button class="staff-link" onclick="exportRoomTypes()" style="padding:12px 24px;font-size:14px">
            🛏️ 导出房型Excel
          </button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ============ 配置 ============
    const API_BASE = '';
    const ROOM_TYPE_INVENTORY = {
      "特惠大床房": 2, "精选大床房": 12, "豪华大床房": 17,
      "城堡亲子房": 4, "麻将双床房": 7, "麻将套房": 2, "圆床房": 1
    };

    // ============ 状态 ============
    let currentData = null;
    let roomsIncomeChart = null;
    let occRevpgrChart = null;
    let channelPieChart = null;
    let roomtypeChart = null;

    // ============ 工具函数 ============
    const Fmt = {
      money: v => v != null ? '¥' + Number(v).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '—',
      rate: v => v != null ? Number(v).toFixed(1) + '%' : '—',
      num: v => v != null ? Number(v).toLocaleString() : '—',
      date: d => d ? d.substring(5) : '—'
    };

    // ============ 认证 ============
    function getToken() { return localStorage.getItem('hotel_token'); }
    function getUser() {
      try { return JSON.parse(localStorage.getItem('hotel_user') || '{}'); }
      catch { return {}; }
    }
    function logout() {
      localStorage.clear();
      location.href = 'index.html';
    }
    async function api(path, opts = {}) {
      const res = await fetch(API_BASE + path, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`,
          ...opts.headers
        }
      });
      if (res.status === 401) { logout(); throw new Error('未登录'); }
      return res.json();
    }

    // ============ 初始化 ============
    async function init() {
      const user = getUser();
      if (!user.phone) { location.href = 'index.html'; return; }
      document.getElementById('userBadge').textContent = `${user.name || user.phone} (${user.role})`;

      // 初始化月份选择器
      const now = new Date();
      const yearSel = document.getElementById('yearSelect');
      const monthSel = document.getElementById('monthSelect');
      for (let y = now.getFullYear(); y >= 2024; y--) {
        yearSel.options.add(new Option(y + '年', y));
      }
      for (let m = 1; m <= 12; m++) {
        monthSel.options.add(new Option(m + '月', m));
      }
      yearSel.value = 2026;
      monthSel.value = 5;

      await loadData();
    }

    // ============ 加载数据 ============
    async function loadData() {
      const year = document.getElementById('yearSelect').value;
      const month = document.getElementById('monthSelect').value;

      try {
        currentData = await api(`/api/reports/monthly?year=${year}&month=${month}`);
        renderAll();
      } catch (e) {
        alert('加载失败: ' + e.message);
      }
    }

    // ============ 渲染所有模块 ============
    function renderAll() {
      if (!currentData || !currentData.reports || currentData.reports.length === 0) {
        showEmpty();
        return;
      }

      renderKPIs();
      renderCharts();
      renderChannels();
      renderRoomTypes();
      renderDailyTable();
    }

    function showEmpty() {
      document.getElementById('kpiGrid').innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="icon">📭</div>
          <p>暂无数据</p>
        </div>`;
    }

    // ============ 模块一：KPI ============
    function renderKPIs() {
      const s = currentData.summary;
      const reports = currentData.reports;

      document.getElementById('kpiReports').textContent = currentData.reportCount || 0;
      document.getElementById('kpiIncome').textContent = Fmt.money(s.totalIncome).replace('¥', '');
      document.getElementById('kpiAvgIncome').textContent = Fmt.money(s.avgIncome).replace('¥', '');
      document.getElementById('kpiOccupancy').textContent = Fmt.rate(s.avgOccupancy);
      document.getElementById('kpiAvgPrice').textContent = '¥' + (s.avgRevpgr || 0).toFixed(1);
      document.getElementById('kpiTotalRooms').textContent = Fmt.num(s.totalRooms || 0);
      document.getElementById('reportCountBadge').textContent = (currentData.reportCount || 0) + ' 天';
    }

    // ============ 模块二：趋势图表 ============
    function renderCharts() {
      const reports = currentData.reports;
      const labels = reports.map(r => r.date.substring(5));
      const incomes = reports.map(r => r.total_income || 0);
      const rooms = reports.map(r => r.total_rooms || 0);
      const occ = reports.map(r => r.occupancy_rate || 0);
      const revpgr = reports.map(r => r.revpgr || 0);

      // 柱状图：开房数 + 营业额
      if (roomsIncomeChart) roomsIncomeChart.destroy();
      const ctx1 = document.getElementById('roomsIncomeChart').getContext('2d');
      roomsIncomeChart = new Chart(ctx1, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: '营业额(元)',
              data: incomes,
              backgroundColor: 'rgba(233,69,96,0.8)',
              borderRadius: 6,
              yAxisID: 'y'
            },
            {
              label: '开房数(间)',
              data: rooms,
              type: 'line',
              borderColor: '#0f3460',
              backgroundColor: 'rgba(15,52,96,0.1)',
              tension: 0.4,
              fill: true,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.dataset.label.includes('营业额') ? Fmt.money(ctx.raw) : ctx.raw + '间'}`
              }
            }
          },
          scales: {
            y: { type: 'linear', position: 'left', title: { display: true, text: '营业额(元)' }, grid: { color: '#f0f0f0' } },
            y1: { type: 'linear', position: 'right', title: { display: true, text: '开房数(间)' }, grid: { drawOnChartArea: false } }
          }
        }
      });

      // 折线图：入住率 + RevPGR
      if (occRevpgrChart) occRevpgrChart.destroy();
      const ctx2 = document.getElementById('occRevpgrChart').getContext('2d');
      occRevpgrChart = new Chart(ctx2, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: '入住率(%)',
              data: occ,
              borderColor: '#2e7d32',
              backgroundColor: 'rgba(46,125,50,0.1)',
              tension: 0.4,
              fill: true
            },
            {
              label: 'RevPGR(元)',
              data: revpgr,
              borderColor: '#e65100',
              backgroundColor: 'rgba(230,81,0,0.1)',
              tension: 0.4,
              fill: true
            }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { position: 'top' } },
          scales: {
            y: { title: { display: true, text: '百分比/金额' }, grid: { color: '#f0f0f0' } }
          }
        }
      });
    }

    // ============ 模块三：渠道数据 ============
    function renderChannels() {
      const ch = currentData.summary.channelData || {};
      const totalIncome = currentData.summary.totalIncome || 1;

      const channels = [
        { key: 'meituan', name: '美团', icon: '📱' },
        { key: 'ctrip', name: '携程', icon: '✈️' },
        { key: 'fliggy', name: '飞猪', icon: '🐷' },
        { key: 'douyin', name: '抖音', icon: '🎵' },
        { key: 'wechat', name: '微信', icon: '💬' },
        { key: 'cash', name: '现金', icon: '💵' },
        { key: 'alipay', name: '支付宝', icon: '💳' }
      ];

      let html = '';
      channels.forEach(c => {
        const d = ch[c.key] || { rooms: 0, income: 0 };
        const pct = ((d.income / totalIncome) * 100).toFixed(1);
        html += `
          <div class="channel-item">
            <div class="channel-icon">${c.icon}</div>
            <div class="channel-info">
              <div class="channel-name">${c.name}</div>
              <div class="channel-value">${Fmt.num(d.rooms)}间 / ${Fmt.money(d.income)}</div>
              <div class="channel-sub">占比 ${pct}%</div>
            </div>
          </div>`;
      });
      document.getElementById('channelGrid').innerHTML = html;

      // 饼图
      if (channelPieChart) channelPieChart.destroy();
      const ctx = document.getElementById('channelPieChart').getContext('2d');
      channelPieChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: channels.map(c => c.name),
          datasets: [{
            data: channels.map(c => ch[c.key]?.income || 0),
            backgroundColor: ['#e94560','#0f3460','#ff9800','#4caf50','#2196f3','#9c27b0','#00bcd4']
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'right' },
            tooltip: { callbacks: { label: ctx => `${ctx.label}: ${Fmt.money(ctx.raw)}` } }
          }
        }
      });
    }

    // ============ 模块四：房型数据 ============
    function renderRoomTypes() {
      // 聚合所有房型数据
      const rtData = {};
      currentData.reports.forEach(r => {
        const rts = r.room_types || {};
        Object.keys(ROOM_TYPE_INVENTORY).forEach(rt => {
          if (!rtData[rt]) rtData[rt] = { rooms: 0, income: 0 };
          const d = rts[rt] || {};
          rtData[rt].rooms += d.rooms || 0;
          rtData[rt].income += d.income || 0;
        });
      });

      let html = '';
      const rtNames = Object.keys(ROOM_TYPE_INVENTORY);
      rtNames.forEach(rt => {
        const d = rtData[rt] || { rooms: 0, income: 0 };
        const avgPrice = d.rooms > 0 ? (d.income / d.rooms).toFixed(2) : 0;
        html += `
          <div class="roomtype-item">
            <div class="roomtype-name">${rt} (${ROOM_TYPE_INVENTORY[rt]}间)</div>
            <div class="roomtype-row"><span class="roomtype-label">开房数</span><span class="roomtype-value">${d.rooms}间</span></div>
            <div class="roomtype-row"><span class="roomtype-label">收入</span><span class="roomtype-value" style="color:#e94560">${Fmt.money(d.income)}</span></div>
            <div class="roomtype-row"><span class="roomtype-label">均价</span><span class="roomtype-value">¥${avgPrice}</span></div>
          </div>`;
      });
      document.getElementById('roomtypeGrid').innerHTML = html;

      // 房型收入图
      if (roomtypeChart) roomtypeChart.destroy();
      const ctx = document.getElementById('roomtypeChart').getContext('2d');
      roomtypeChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: rtNames,
          datasets: [{
            label: '房型收入(元)',
            data: rtNames.map(rt => rtData[rt]?.income || 0),
            backgroundColor: ['#e94560','#0f3460','#ff9800','#4caf50','#2196f3','#9c27b0','#00bcd4']
          }]
        },
        options: {
          responsive: true,
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => Fmt.money(ctx.raw) } }
          },
          scales: { x: { grid: { color: '#f0f0f0' } } }
        }
      });
    }

    // ============ 模块五：日报明细 ============
    function renderDailyTable() {
      const tbody = document.getElementById('dailyTableBody');
      let html = '';
      currentData.reports.forEach(r => {
        html += `
          <tr>
            <td>${r.date}</td>
            <td class="money">${Fmt.money(r.total_income)}</td>
            <td class="num">${r.total_rooms || 0}</td>
            <td><span class="badge ${r.occupancy_rate >= 80 ? 'badge-green' : r.occupancy_rate >= 50 ? 'badge-orange' : 'badge-red'}">${Fmt.rate(r.occupancy_rate)}</span></td>
            <td>¥${(r.avg_price || 0).toFixed(1)}</td>
            <td class="num">¥${(r.revpgr || 0).toFixed(1)}</td>
            <td>${r.meituan_rooms || 0}</td>
            <td>${r.ctrip_rooms || 0}</td>
            <td>${r.fliggy_rooms || 0}</td>
            <td>${r.douyin_rooms || 0}</td>
            <td>${r.wechat_rooms || 0}</td>
            <td>${r.cash_rooms || 0}</td>
            <td>${r.alipay_rooms || 0}</td>
          </tr>`;
      });
      tbody.innerHTML = html;
    }

    // ============ Tab切换 ============
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('dailyTab').style.display = tab === 'daily' ? 'block' : 'none';
      document.getElementById('exportTab').style.display = tab === 'export' ? 'block' : 'none';
    }

    // ============ 导出功能 ============
    async function exportDaily() {
      const year = document.getElementById('yearSelect').value;
      const month = document.getElementById('monthSelect').value;
      window.open(`${API_BASE}/api/reports/export/daily?year=${year}&month=${month}`, '_blank');
    }
    async function exportRoomTypes() {
      const year = document.getElementById('yearSelect').value;
      const month = document.getElementById('monthSelect').value;
      window.open(`${API_BASE}/api/reports/export/roomtypes?year=${year}&month=${month}`, '_blank');
    }

    // ============ 启动 ============
    init();
  </script>
</body>
</html>
