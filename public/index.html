<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 华悦艺术酒店</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      padding: 20px;
    }
    .login-card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }
    .hotel-icon { font-size: 56px; text-align: center; margin-bottom: 8px; }
    .hotel-name {
      text-align: center; font-size: 22px; font-weight: 700;
      color: #1a1a2e; margin-bottom: 4px;
    }
    .hotel-sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 36px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 14px; font-weight: 600;
      color: #444; margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: 14px 16px; font-size: 16px;
      border: 2px solid #e0e0e0; border-radius: 12px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      color: #1a1a2e; background: #fafafa;
    }
    .input-wrap input:focus {
      border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.12);
      background: #fff;
    }
    .input-row { display: flex; gap: 10px; }
    .input-row input { flex: 1; }
    .send-btn {
      padding: 14px 16px; background: #0f3460; color: #fff;
      border: none; border-radius: 12px; font-size: 13px;
      cursor: pointer; white-space: nowrap; font-weight: 600;
      transition: background 0.2s;
    }
    .send-btn:hover { background: #1a4a7a; }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    .submit-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, #e94560, #c2315a);
      color: #fff; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 8px; transition: transform 0.15s, box-shadow 0.15s;
    }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(233,69,96,0.35); }
    .submit-btn:active { transform: translateY(0); }
    .hint {
      text-align: center; margin-top: 24px; font-size: 12px;
      color: #aaa; line-height: 1.7;
    }
    .hint strong { color: #e94560; }
    .error-msg {
      background: #fff3f3; border: 1px solid #ffcccc;
      color: #c00; padding: 12px 16px; border-radius: 10px;
      margin-bottom: 16px; font-size: 14px; display: none;
    }
    .quick-login {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .quick-login h4 {
      font-size: 12px; color: #999; text-align: center;
      margin-bottom: 12px; font-weight: 500;
    }
    .quick-btns { display: flex; gap: 8px; }
    .quick-btn {
      flex: 1; padding: 10px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; background: #fafafa; cursor: pointer;
      font-size: 13px; color: #555; transition: all 0.2s;
    }
    .quick-btn:hover { border-color: #0f3460; background: #f0f4ff; color: #0f3460; }
    .quick-btn span { display: block; font-size: 11px; color: #999; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="hotel-icon">🏨</div>
    <div class="hotel-name">华悦艺术酒店 · 冠华店</div>
    <div class="hotel-sub">运营数据管理系统</div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>手机号码</label>
      <div class="input-wrap">
        <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
      </div>
    </div>

    <div class="form-group">
      <label>验证码</label>
      <div class="input-row">
        <input type="text" id="code" placeholder="6位数字" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
        <button class="send-btn" id="sendBtn" onclick="sendCode()">发送验证码</button>
      </div>
    </div>

    <button class="submit-btn" onclick="doLogin()">登 录</button>

    <div class="hint">
      <p>验证码任意填写 6 位数字即可登录（演示模式）</p>
    </div>

    <div class="quick-login">
      <h4>快速登录（演示账号）</h4>
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickLogin('19128957480')">
          👤 员工<small><span>上传权限</span></span>
        </button>
        <button class="quick-btn" onclick="quickLogin('13802531098')">
          👔 老板A<small><span>全权限</span></small>
        </button>
        <button class="quick-btn" onclick="quickLogin('18602032126')">
          👔 老板B<small><span>全权限</span></small>
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // If already logged in, redirect
    if (Auth.getUser()) {
      const u = Auth.getUser();
      go(u.role === 'boss' ? 'boss' : 'staff');
    }

    let countdown = 0;
    let timer;

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function sendCode() {
      const phone = document.getElementById('phone').value.trim();
      if (!/^1\d{10}$/.test(phone)) {
        showError('请输入正确的11位手机号');
        return;
      }
      countdown = 60;
      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      document.getElementById('code').focus();
      timer = setInterval(() => {
        btn.textContent = countdown + 's后可重发';
        countdown--;
        if (countdown <= 0) {
          clearInterval(timer);
          btn.textContent = '发送验证码';
          btn.disabled = false;
        }
      }, 1000);
    }

    async function doLogin() {
      const phone = document.getElementById('phone').value.trim();
      const code = document.getElementById('code').value.trim();

      if (!/^1\d{10}$/.test(phone)) { showError('请输入正确的手机号'); return; }
      if (!/^\d{6}$/.test(code)) { showError('验证码为6位数字'); return; }

      try {
        const res = await API.login(phone, code);
        Auth.setSession(res.token, res.user);
        showError('');
        go(res.user.role === 'boss' ? 'boss' : 'staff');
      } catch (e) {
        showError(e.message);
      }
    }

    async function quickLogin(phone) {
      document.getElementById('phone').value = phone;
      document.getElementById('code').value = '888888';
      await doLogin();
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
